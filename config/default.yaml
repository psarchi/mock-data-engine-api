server:
  debug:
    status: false
    accepts: "bool"
    description: "enable FastAPI debug mode"
  port:
    value: 8000
    accepts: "int"
    description: "HTTP server port"

features:
  chaos:
    enabled: true
    enabled_meta:
      accepts: "bool"
      description: "Master kill switch for all chaos operations."
    scopes: ["generate"]
    scopes_meta:
      accepts: "list[str]"
      description: "Endpoint scopes where chaos may run: generate|validate|schema|admin."
    selection:
      min_ops: 0
      min_ops_meta:
        accepts: "int>=0"
        description: "Lower bound of chaos ops to apply per request after activation."
      max_ops: "all"
      max_ops_meta:
        accepts: "int>=0 | 'all'"
        description: "Upper bound of ops to apply per request; 'all' disables the cap."
      ensure_at_least_one_when_any_enabled: false
      ensure_at_least_one_when_any_enabled_meta:
        accepts: "bool"
        description: "If true, force-select one op when none activate but at least one is enabled."
    budgets:
      max_added_latency_ms: 1500
      max_added_latency_ms_meta:
        accepts: "int>=0"
        description: "Budget cap for total artificial latency injected in a single request."
      max_faults_per_request: 999
      max_faults_per_request_meta:
        accepts: "int>=0"
        description: "Maximum number of request-phase fault ops (e.g., http_error) per request."
    ops:
      latency:
        enabled: true
        enabled_meta:
          accepts: "bool"
          description: "Toggle latency injection."
        p: 0.35
        p_meta:
          accepts: "float 0..1"
          description: "Independent activation probability for this op."
        weight: 2
        weight_meta:
          accepts: "float>0"
          description: "Relative selection weight; higher increases sampling likelihood."
        min_ms: 60
        min_ms_meta:
          accepts: "int>=0"
          description: "Lower bound for injected latency in milliseconds."
        max_ms: 300
        max_ms_meta:
          accepts: "int>=min_ms"
          description: "Upper bound for injected latency in milliseconds."
        description: "Request-phase; sleeps for a random delay within [min_ms, max_ms]."
      http_error:
        enabled: false
        enabled_meta:
          accepts: "bool"
          description: "Toggle HTTP error short-circuit."
        p: 0.05
        p_meta:
          accepts: "float 0..1"
          description: "Independent activation probability for this op."
        weight: 5
        weight_meta:
          accepts: "float>0"
          description: "Relative selection weight; heavier since it's a severe fault."
        codes: [429, 500, 502]
        codes_meta:
          accepts: "list[int] (HTTP status codes)"
          description: "HTTP status codes to randomly return when this op is applied."
        description: "Request-phase; returns one of the configured error codes immediately."
      order_shuffle:
        enabled: false
        enabled_meta:
          accepts: "bool"
          description: "Toggle post-generation item order randomization."
        p: 0.10
        p_meta:
          accepts: "float 0..1"
          description: "Independent activation probability for this op."
        weight: 1
        weight_meta:
          accepts: "float>0"
          description: "Relative selection weight for the stochastic composer."
        description: "Response-phase; shuffles list payload order deterministically via ctx.rng."
      payload_truncate:
        enabled: false
        enabled_meta:
          accepts: "bool"
          description: "Toggle truncation of the response item list."
        p: 0.10
        p_meta:
          accepts: "float 0..1"
          description: "Independent activation probability for this op."
        weight: 3
        weight_meta:
          accepts: "float>0"
          description: "Relative selection weight for the stochastic composer."
        min_items: 1
        min_items_meta:
          accepts: "int>=0"
          description: "Minimum number of items to retain after truncation."
        description: "Response-phase; slices the list to a random length in [min_items, len(items)]."
      auth_fault:
        enabled: false
        enabled_meta:
          accepts: "bool"
          description: "Toggle auth failures or anomalies."
        p: 0.05
        p_meta:
          accepts: "float 0..1"
          description: "Independent activation probability for this op."
        weight: 4
        weight_meta:
          accepts: "float>0"
          description: "Relative selection weight for the stochastic composer."
        modes: [ "reject", "drop", "invalid" ]
        modes_meta:
          accepts: "list[str] in {reject,drop,invalid}"
          description: "Behavior: reject with 401/403; drop Authorization; or mark as invalid."
        codes: [ 401, 403 ]
        codes_meta:
          accepts: "list[int]"
          description: "HTTP status codes to use when mode='reject'."
        description: "Request-phase; may short-circuit with 401/403 or simulate missing/invalid Authorization."
      header_anomaly:
        enabled: false
        enabled_meta:
          accepts: "bool"
          description: "Toggle anomalous headers on the request."
        p: 0.10
        p_meta:
          accepts: "float 0..1"
          description: "Independent activation probability for this op."
        weight: 2
        weight_meta:
          accepts: "float>0"
          description: "Relative selection weight for the stochastic composer."
        patterns: [ "huge_value", "non_ascii", "dup_keys" ]
        patterns_meta:
          accepts: "list[str] in {huge_value,non_ascii,dup_keys}"
          description: "Choose which header anomaly patterns can be applied."
        huge_value_bytes: 8192
        huge_value_bytes_meta:
          accepts: "int>=0"
          description: "Size of the large header value when using 'huge_value'."
        dup_keys_count: 2
        dup_keys_count_meta:
          accepts: "int>=2"
          description: "How many duplicate keys to attempt when using 'dup_keys'."
        description: "Request-phase; records intended header anomalies in meta (transport mutation may require middleware)."
      partial_load:
        enabled: false
        enabled_meta:
          accepts: "bool"
          description: "Toggle cutting the list mid-way to simulate partial responses."
        p: 0.10
        p_meta:
          accepts: "float 0..1"
          description: "Independent activation probability for this op."
        weight: 2
        weight_meta:
          accepts: "float>0"
          description: "Relative selection weight for the stochastic composer."
        description: "Response-phase; slices the response list at a random cut index."
      encoding_corrupt:
        enabled: false
        enabled_meta:
          accepts: "bool"
          description: "Toggle light string corruption within items (replacement char)."
        p: 0.05
        p_meta:
          accepts: "float 0..1"
          description: "Independent activation probability for this op."
        weight: 3
        weight_meta:
          accepts: "float>0"
          description: "Relative selection weight for the stochastic composer."
        fields_to_corrupt: 1
        fields_to_corrupt_meta:
          accepts: "int>=0"
          description: "Budget of string fields to corrupt across the whole payload."
        description: "Response-phase; replaces a character in selected strings with U+FFFD for safe corruption."
      time_skew:
        enabled: false
        enabled_meta:
          accepts: "bool"
          description: "Toggle shifting numeric time fields by +/- seconds."
        p: 0.10
        p_meta:
          accepts: "float 0..1"
          description: "Independent activation probability for this op."
        weight: 2
        weight_meta:
          accepts: "float>0"
          description: "Relative selection weight for the stochastic composer."
        max_skew_s: 3600
        max_skew_s_meta:
          accepts: "int>=1"
          description: "Maximum absolute seconds to shift by."
        direction: "both"
        direction_meta:
          accepts: "both | past | future"
          description: "Direction of skew to apply."
        fields: [ "event_timestamp" ]
        fields_meta:
          accepts: "list[str]"
          description: "Field names in each item to skew if numeric."
        description: "Response-phase; adds/subtracts seconds to listed numeric fields."
      rate_drift:
        enabled: false
        enabled_meta:
          accepts: "bool"
          description: "Toggle request-level variable latency to simulate throughput drift."
        p: 0.10
        p_meta:
          accepts: "float 0..1"
          description: "Independent activation probability for this op."
        weight: 3
        weight_meta:
          accepts: "float>0"
          description: "Relative selection weight for the stochastic composer."
        pattern: "sine"
        pattern_meta:
          accepts: "sine | step | burst | random_walk"
          description: "Rate drift shape."
        amp_ms: 250
        amp_ms_meta:
          accepts: "int>=0"
          description: "Peak added latency in milliseconds."
        period_s: 60
        period_s_meta:
          accepts: "float>0 (sine/step only)"
          description: "Wave period in seconds."
        burst_prob: 0.05
        burst_prob_meta:
          accepts: "float 0..1 (burst only)"
          description: "Chance of a max-latency burst on a given request."
        step_ms: 25
        step_ms_meta:
          accepts: "int>=1 (random_walk only)"
          description: "Max step size per request for the random walk."
        description: "Request-phase; injects latency based on a drift pattern using the request RNG."
      data_drift:
        enabled: false
        enabled_meta:
          accepts: "bool"
          description: "Toggle field-level value drift (categorical reweighting or numeric bias/jitter)."
        p: 0.15
        p_meta:
          accepts: "float 0..1"
          description: "Independent activation probability for this op."
        weight: 3
        weight_meta:
          accepts: "float>0"
          description: "Relative selection weight for the stochastic composer."
        q: 0.15
        q_meta:
          accepts: "float 0..1"
          description: "Default per-field chance to alter a value when the op is active."
        fields:
          event_name:
            mode: "categorical"
            choices: [ "purchase", "login", "search", "view_item" ]
            weights_delta:
              purchase: +0.2
              login: -0.1
            q: 0.25
          event_value:
            mode: "numeric"
            add: 0.0
            mul: 1.0
            jitter: 1.5
            q: 0.15
        fields_meta:
          accepts: "dict[str, FieldSpec]"
          description: "Map individual fields to drift specs (categorical or numeric)."
        description: "Response-phase; adjusts values for selected fields according to drift specs using rng."
      schema_drift:
        enabled: false
        enabled_meta:
          accepts: "bool"
          description: "Toggle schema drift: add/drop/rename fields in the response items."
        p: 0.10
        p_meta:
          accepts: "float 0..1"
          description: "Independent activation probability for this op."
        weight: 4
        weight_meta:
          accepts: "float>0"
          description: "Relative selection weight for the stochastic composer."
        add_fields:
          extra_flag: true
        add_fields_meta:
          accepts: "dict[str, any]"
          description: "Fields to add with constant values when missing."
        drop_fields: [ "user_id" ]
        drop_fields_meta:
          accepts: "list[str]"
          description: "Fields to remove from each item if present."
        rename_fields:
          device_category: "device_type"
        rename_fields_meta:
          accepts: "dict[str,str]"
          description: "Old->new field rename mapping."
        description: "Response-phase; applies add/drop/rename transforms to item dicts."




  sinks:
    enabled:
      status: false
      accepts: "bool"
      description: "enable/disable sinks/connectors"
    outputs:
      list: []
      accepts: "list[str]"
      description: "sink definitions (placeholder: supply list of connector specs)"
  generation_meta:
    enabled:
      status: false
      accepts: "bool"
      description: "include __meta in responses (per-item for schema GET; top-level for POST /v1/generate)"
    include_gen_ms:
        status: true
        accepts: "bool"
        description: "include generation time (gen_ms)"
    include_e2e_ms:
        status: true
        accepts: "bool"
        description: "include end-to-end handler time (e2e_ms)"
  observability:
    metrics_enabled:
      status: false
      accepts: "bool"
      description: "expose Prometheus metrics endpoint"
    prometheus_path:
      value: "/metrics"
      accepts: "str"
      description: "metrics endpoint path"
    otel:
      enabled:
        status: false
        accepts: "bool"
        description: "enable OpenTelemetry export"
      exporter_otlp_endpoint:
        value: ""
        accepts: "str"
        description: "OTLP exporter endpoint (empty to disable)"

  admin:
    enabled:
      status: true
      accepts: "bool"
      description: "enable admin endpoints"
    allow_upload:
      status: false
      accepts: "bool"
      description: "allow schema upload via admin routes"
    storage_path:
      value: "./.admin-store"
      accepts: "str"
      description: "admin storage directory"

  scenarios:
    active:
      list: []
      accepts: "list[str]"
      description: "active scenario names (e.g., black_friday)"

  graphql:
    enabled:
      status: false
      accepts: "bool"
      description: "enable GraphQL endpoint"

  dlq:
    enabled:
      status: false
      accepts: "bool"
      description: "enable dead-letter queue handling"
    storage_path:
      value: "./.dlq"
      accepts: "str"
      description: "DLQ storage directory"
    simulate_exactly_once:
      status: false
      accepts: "bool"
      description: "simulate exactly-once delivery semantics"

  security:
    mode:
      value: "none"
      accepts: "enum[none,basic,jwt]"
      description: "auth mode for protected routes"
    allowed_roles:
      list: ["admin", "dev", "read"]
      accepts: "list[str]"
      description: "authorized roles (used with basic/jwt modes)"
    pii_mode:
      value: "passthrough"
      accepts: "enum[passthrough,mask,tokenize,redact]"
      description: "PII handling policy"

generation:
  seed_mode:
    value: "auto"
    accepts: "enum[auto,fixed]"
    description: "seed selection strategy"
  fixed_seed:
    value: 0
    accepts: "int"
    description: "fixed seed value (used only when seed_mode=fixed)"
