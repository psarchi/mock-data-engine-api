chaos:
  type: group
  enabled:
    type: bool
    value: true
    description: Master kill switch for all chaos operations.
  scopes:
    type: list
    value:
    - generate
    description: 'Endpoint scopes where chaos may run: generate|validate|schema|admin.'
    items:
      type: string
  selection:
    type: group
    min_ops:
      type: int
      value: 0
      description: Lower bound of chaos ops to apply per request after activation.
      constraints:
        ge: 0.0
    max_ops:
      type: str
      value: 9999
      description: Upper bound of ops to apply per request; 'all' disables the cap.
      constraints:
        ge: 1.0
    ensure_at_least_one_when_any_enabled:
      type: bool
      value: true
      description: If true, force-select one op when none activate but at least one
        is enabled.
  budgets:
    type: group
    max_added_latency_ms:
      type: int
      value: 1500
      description: Budget cap for total artificial latency injected in a single request.
      constraints:
        ge: 0.0
    max_faults_per_request:
      type: int
      value: 999
      description: Maximum number of request-phase fault ops (e.g., http_error) per
        request.
      constraints:
        ge: 0.0
  ops:
    type: group
    latency:
      description: Request-phase; sleeps for a random delay within [min_ms, max_ms].
      type: group
      enabled:
        type: bool
        value: false
        description: Toggle latency injection.
      p:
        type: float
        value: 0
        description: Independent activation probability for this op.
        constraints:
          ge: 0.0
          le: 1.0
      weight:
        type: float
        value: 5.2631578947368425
        description: Relative selection weight; higher increases sampling likelihood.
        constraints:
          gt: 0.0
      min_ms:
        type: int
        value: 60
        description: Lower bound for injected latency in milliseconds.
        constraints:
          ge: 0.0
      max_ms:
        type: int
        value: 300
        description: Upper bound for injected latency in milliseconds.
    late_arrival:
      description: Response-phase; mutates timestamp fields to random past values simulating out-of-order events.
      type: group
      enabled:
        type: bool
        value: true
        description: Toggle late arrival chaos operation.
      p:
        type: float
        value: 0.01
        description: Independent activation probability for this op.
        constraints:
          ge: 0.0
          le: 1.0
      weight:
        type: float
        value: 5.2631578947368425
        description: Relative selection weight; higher increases sampling likelihood.
        constraints:
          gt: 0.0
      min_elapsed_seconds:
        type: int
        value: 10
        description: Minimum elapsed timeline seconds before late arrival becomes eligible.
        constraints:
          ge: 0.0
      late_window_seconds:
        type: int
        value: 5
        description: Maximum seconds back from current to generate late timestamps.
        constraints:
          ge: 1.0
    http_error:
      description: Request-phase; returns one of the configured error codes immediately.
      type: group
      enabled:
        type: bool
        value: true
        description: Toggle HTTP error short-circuit.
      p:
        type: float
        value: 0.01
        description: Independent activation probability for this op.
        constraints:
          ge: 0.0
          le: 1.0
      weight:
        type: float
        value: 5.2631578947368425
        description: Relative selection weight; heavier since it's a severe fault.
        constraints:
          gt: 0.0
      codes:
        type: list
        value:
        - 429
        - 500
        - 502
        description: HTTP status codes to randomly return when this op is applied.
        items:
          type: int
    http_mismatch:
      description: Response-phase; forces non-2xx status codes while leaving the body untouched.
      type: group
      enabled:
        type: bool
        value: true
        description: Toggle HTTP status/body mismatch faults.
      p:
        type: float
        value: 0.01
        description: Independent activation probability for this op.
        constraints:
          ge: 0.0
          le: 1.0
      weight:
        type: float
        value: 5.2631578947368425
        description: Relative selection weight for the stochastic composer.
        constraints:
          gt: 0.0
      codes:
        type: list
        value:
        - 400
        - 401
        - 403
        - 409
        - 412
        - 422
        - 429
        - 500
        - 502
        - 503
        description: Candidate HTTP status codes for mismatched responses.
        items:
          type: int
    list_shuffle:
      description: Response-phase; shuffles every list in the body deterministically via
        ctx.rng.
      type: group
      enabled:
        type: bool
        value: true
        description: Toggle post-generation item order randomization.
      p:
        type: float
        value: 0.01
        description: Independent activation probability for this op.
        constraints:
          ge: 0.0
          le: 1.0
      weight:
        type: float
        value: 5.2631578947368425
        description: Relative selection weight for the stochastic composer.
        constraints:
          gt: 0.0
    truncate:
      description: Response-phase; truncates serialized JSON fragments to corrupt payload text.
      type: group
      enabled:
        type: bool
        value: true
        description: Toggle payload truncation/corruption.
      p:
        type: float
        value: 0.01
        description: Independent activation probability for this op.
        constraints:
          ge: 0.0
          le: 1.0
      weight:
        type: float
        value: 5.2631578947368425
        description: Relative selection weight for the stochastic composer.
        constraints:
          gt: 0.0
      min_items:
        type: int
        value: 1
        description: Minimum corrupted elements when targeting list entries.
        constraints:
          ge: 0.0
      max_items:
        type: int
        value: 3
        description: Maximum corrupted elements when targeting list entries.
        constraints:
          ge: 1.0
    schema_bloat:
      description: Response-phase; inflates string fields to simulate payload growth.
      type: group
      enabled:
        type: bool
        value: true
        description: Toggle schema bloat string inflation.
      p:
        type: float
        value: 0.01
        description: Independent activation probability for this op.
        constraints:
          ge: 0.0
          le: 1.0
      weight:
        type: float
        value: 5.2631578947368425
        description: Relative selection weight for the stochastic composer.
        constraints:
          gt: 0.0
      extra_kb:
        type: int
        value: 32
        description: Approximate additional kilobytes to inject into a string field.
        constraints:
          ge: 0.0
      strategy:
        type: str
        value: insert
        description: String inflation strategy ('insert' or 'repeat').
    schema_field_nulling:
      description: Response-phase; nulls a single field within the response payload.
      type: group
      enabled:
        type: bool
        value: true
        description: Toggle schema field nulling.
      p:
        type: float
        value: 0.01
        description: Independent activation probability for this op.
        constraints:
          ge: 0.0
          le: 1.0
      weight:
        type: float
        value: 5.2631578947368425
        description: Relative selection weight for the stochastic composer.
        constraints:
          gt: 0.0
      fields:
        type: list
        value: []
        description: Optional dotted paths eligible for nulling (default any leaf).
        items:
          type: string
    schema_time_skew:
      description: Response-phase; skews configured timestamp fields by up to max_skew_s seconds.
      type: group
      enabled:
        type: bool
        value: true
        description: Toggle timestamp skew mutations.
      p:
        type: float
        value: 0.01
        description: Independent activation probability for this op.
        constraints:
          ge: 0.0
          le: 1.0
      weight:
        type: float
        value: 5.2631578947368425
        description: Relative selection weight for the stochastic composer.
        constraints:
          gt: 0.0
      max_skew_s:
        type: int
        value: 900
        description: Maximum absolute timestamp skew in seconds.
        constraints:
          ge: 0.0
      direction:
        type: str
        value: both
        description: Direction of skew ('past', 'future', or 'both').
      fields:
        type: list
        value: [event_timestamp]
        description: Timestamp field names (ISO8601 or epoch) to skew.
        items:
          type: string
    duplicate_items:
      description: Response-phase; duplicates elements within lists found in the response body.
      type: group
      enabled:
        type: bool
        value: true
        description: Toggle duplication of list items throughout the body.
      p:
        type: float
        value: 0.01
        description: Independent activation probability for this op.
        constraints:
          ge: 0.0
          le: 1.0
      weight:
        type: float
        value: 5.2631578947368425
        description: Relative selection weight for the stochastic composer.
        constraints:
          gt: 0.0
      max_dups:
        type: int
        value: 1
        description: Maximum number of additional copies inserted per list encounter.
        constraints:
          ge: 1.0
      strategy:
        type: str
        value: adjacent
        description: Duplication placement strategy ('adjacent' or 'random').
      include_root:
        type: bool
        value: true
        description: When true, also duplicate lists directly under the root object.
    auth_fault:
      description: Request-phase; may short-circuit with 401/403 or simulate missing/invalid
        Authorization.
      type: group
      enabled:
        type: bool
        value: true
        description: Toggle auth failures or anomalies.
      p:
        type: float
        value: 0.01
        description: Independent activation probability for this op.
        constraints:
          ge: 0.0
          le: 1.0
      weight:
        type: float
        value: 5.2631578947368425
        description: Relative selection weight for the stochastic composer.
        constraints:
          gt: 0.0
      modes:
        type: str
        value:
        - reject
        - drop
        - invalid
        description: 'Behavior: reject with 401/403; drop Authorization; or mark as
          invalid.'
      codes:
        type: list
        value:
        - 401
        - 403
        description: HTTP status codes to use when mode='reject'.
        items:
          type: int
    header_anomaly:
      description: Request-phase; records intended header anomalies in meta (transport
        mutation may require middleware).
      type: group
      enabled:
        type: bool
        value: true
        description: Toggle anomalous headers on the request.
      p:
        type: float
        value: 0.01
        description: Independent activation probability for this op.
        constraints:
          ge: 0.0
          le: 1.0
      weight:
        type: float
        value: 5.2631578947368425
        description: Relative selection weight for the stochastic composer.
        constraints:
          gt: 0.0
    random_header_case:
      description: Response-phase; mutates header values by randomizing case.
      type: group
      enabled:
        type: bool
        value: true
        description: Toggle random header casing mutations.
      p:
        type: float
        value: 0.01
        description: Independent activation probability for this op.
        constraints:
          ge: 0.0
          le: 1.0
      weight:
        type: float
        value: 5.2631578947368425
        description: Relative selection weight for the stochastic composer.
        constraints:
          gt: 0.0
      headers:
        type: list
        value:
        - content-type
        description: Header names eligible for casing mutations.
        items:
          type: string
      mode:
        type: str
        value: random
        description: Casing mode ('random', 'upper', or 'lower').
      patterns:
        type: str
        value:
        - huge_value
        - non_ascii
        - dup_keys
        description: Choose which header anomaly patterns can be applied.
      huge_value_bytes:
        type: int
        value: 8192
        description: Size of the large header value when using 'huge_value'.
        constraints:
          ge: 0.0
      dup_keys_count:
        type: int
        value: 2
        description: How many duplicate keys to attempt when using 'dup_keys'.
        constraints:
          ge: 2.0
    partial_load:
      description: Response-phase; slices the response list at a random cut index.
      type: group
      enabled:
        type: bool
        value: true
        description: Toggle cutting the list mid-way to simulate partial responses.
      p:
        type: float
        value: 0.01
        description: Independent activation probability for this op.
        constraints:
          ge: 0.0
          le: 1.0
      weight:
        type: float
        value: 5.2631578947368425
        description: Relative selection weight for the stochastic composer.
        constraints:
          gt: 0.0
    encoding_corrupt:
      description: Response-phase; replaces a character in selected strings with U+FFFD
        for safe corruption.
      type: group
      enabled:
        type: bool
        value: true
        description: Toggle light string corruption within items (replacement char).
      p:
        type: float
        value: 0.01
        description: Independent activation probability for this op.
        constraints:
          ge: 0.0
          le: 1.0
      weight:
        type: float
        value: 5.2631578947368425
        description: Relative selection weight for the stochastic composer.
        constraints:
          gt: 0.0
      fields_to_corrupt:
        type: int
        value: 1
        description: Budget of string fields to corrupt across the whole payload.
        constraints:
          ge: 0.0
    time_skew:
      description: Response-phase; adds/subtracts seconds to listed numeric fields.
      type: group
      enabled:
        type: bool
        value: true
        description: Toggle shifting numeric time fields by +/- seconds.
      p:
        type: float
        value: 0.01
        description: Independent activation probability for this op.
        constraints:
          ge: 0.0
          le: 1.0
      weight:
        type: float
        value: 5.2631578947368425
        description: Relative selection weight for the stochastic composer.
        constraints:
          gt: 0.0
      max_skew_s:
        type: int
        value: 3600
        description: Maximum absolute seconds to shift by.
        constraints:
          ge: 1.0
      direction:
        type: union
        value: both
        description: Direction of skew to apply.
      fields:
        type: list
        value:
        - event_timestamp
        description: Field names in each item to skew if numeric.
        items:
          type: string
    rate_drift:
      description: Request-phase; injects latency based on a drift pattern using the
        request RNG.
      type: group
      enabled:
        type: bool
        value: true
        description: Toggle request-level variable latency to simulate throughput
          drift.
      p:
        type: float
        value: 0.01
        description: Independent activation probability for this op.
        constraints:
          ge: 0.0
          le: 1.0
      weight:
        type: float
        value: 5.2631578947368425
        description: Relative selection weight for the stochastic composer.
        constraints:
          gt: 0.0
      pattern:
        type: union
        value: sine
        description: Rate drift shape.
      amp_ms:
        type: int
        value: 250
        description: Peak added latency in milliseconds.
        constraints:
          ge: 0.0
      period_s:
        type: float
        value: 60.0
        description: Wave period in seconds.
        constraints:
          gt: 0.0
      burst_prob:
        type: float
        value: 0.05
        description: Chance of a max-latency burst on a given request.
        constraints:
          ge: 0.0
          le: 1.0
      step_ms:
        type: int
        value: 25
        description: Max step size per request for the random walk.
        constraints:
          ge: 1.0
    data_drift:
      description: Response-phase; adjusts values for selected fields according to
        drift specs using rng.
      type: group
      enabled:
        type: bool
        value: true
        description: Toggle field-level value drift (categorical reweighting or numeric
          bias/jitter).
      p:
        type: float
        value: 0.01
        description: Independent activation probability for this op.
        constraints:
          ge: 0.0
          le: 1.0
      weight:
        type: float
        value: 5.2631578947368425
        description: Relative selection weight for the stochastic composer.
        constraints:
          gt: 0.0
      max_mutations:
        type: int
        value: 3
        description: Maximum number of contracts to mutate per activation.
        constraints:
          ge: 1.0
      q:
        type: float
        value: 0.15
        description: Default per-field chance to alter a value when the op is active.
        constraints:
          ge: 0.0
          le: 1.0
      max_hits:
        type: int
        value: 3
        description: Maximum number of times a drift layer can be used before it expires.
        constraints:
          ge: 1.0
      config:
        type: group
        value:
          type: group
          max_mutations:
            type: int
            value: 3
            description: Global cap on mutations consumed per schema revision.
            constraints:
              ge: 1.0
          default:
            type: group
            value:
              force_weight: true
            description: Baseline overrides merged into every spec config.
          specs:
            type: group
            value:
              type: group
              int:
                type: group
                value:
                  type: group
                  offset_ratio:
                    type: float
                    value: 0.2
                    description: Relative fraction of the span used when sampling range shifts.
                    constraints:
                      ge: 0.0
                  offset_abs:
                    type: list
                    value: [-5, 5]
                    description: Absolute range for integer bound offsets (lo, hi).
                    items:
                      type: int
                  step_delta:
                    type: int
                    value: 2
                    description: Max step adjustment applied to integer specs when drifted.
                    constraints:
                      ge: 0.0
                  nullable:
                    type: group
                    value:
                      type: group
                      range:
                        type: list
                        value: [0.2, 0.6]
                        description: Inclusive range for p_null sampling when wrapping ints.
                        items:
                          type: float
              float:
                type: group
                value:
                  type: group
                  offset_ratio:
                    type: float
                    value: 0.2
                    description: Relative fraction of the float span used for bound offsets.
                    constraints:
                      ge: 0.0
                  precision_step:
                    type: int
                    value: 1
                    description: Maximum precision step delta applied when drifted.
                    constraints:
                      ge: 0.0
                  nullable:
                    type: group
                    value:
                      type: group
                      range:
                        type: list
                        value: [0.1, 0.4]
                        description: Inclusive range for p_null sampling when wrapping floats.
                        items:
                          type: float
              string:
                type: group
                value:
                  type: group
                  nullable:
                    type: group
                    value:
                      type: group
                      range:
                        type: list
                        value: [0.3, 0.6]
                        description: Inclusive range for p_null sampling when strings become nullable.
                        items:
                          type: float
              array:
                type: group
                value:
                  type: group
                  length_ratio:
                    type: float
                    value: 0.25
                    description: Ratio of current span used to jitter min/max items.
                    constraints:
                      ge: 0.0
                  child:
                    type: group
                    value:
                      type: group
                      int:
                        type: group
                        value:
                          type: group
                          offset_ratio:
                            type: float
                            value: 0.15
                            description: Relative shift for nested integer bounds.
                          offset_abs:
                            type: list
                            value: [-2, 2]
                            description: Absolute jitter for nested integer bounds.
                            items:
                              type: int
                      float:
                        type: group
                        value:
                          type: group
                          offset_ratio:
                            type: float
                            value: 0.1
                            description: Relative shift for nested float bounds.
              maybe:
                type: group
                value:
                  type: group
                  null_delta:
                    type: float
                    value: 0.25
                    description: Max additive delta applied to p_null for Maybe specs.
                    constraints:
                      ge: 0.0
              string_or_null:
                type: group
                value:
                  type: group
                  null_delta:
                    type: float
                    value: 0.2
                    description: Max additive delta applied to weight distributions.
                    constraints:
                      ge: 0.0
              object_or_null:
                type: group
                value:
                  type: group
                  null_delta:
                    type: float
                    value: 0.2
                    description: Max additive delta applied to weight distributions.
                    constraints:
                      ge: 0.0
              enum:
                type: group
                value:
                  type: group
                  shuffle:
                    type: bool
                    value: true
                    description: Toggle random reordering of enum values.
                  weight_delta:
                    type: float
                    value: 0.2
                    description: Max weight adjustment applied between two enum entries.
                    constraints:
                      ge: 0.0
                  force_weight:
                    type: bool
                    value: true
                    description: Force one weight to 1.0 for testing purposes.
              select:
                type: group
                value:
                  type: group
                  shuffle:
                    type: bool
                    value: true
                    description: Shuffle select options prior to mutation.
                  pick_delta:
                    type: int
                    value: 1
                    description: Max additive delta applied to pick counts.
                  child:
                    type: group
                    value:
                      type: group
                      maybe:
                        type: group
                        value:
                          type: group
                          null_delta:
                            type: float
                            value: 0.35
                            description: Max additive delta applied to nested maybe specs.
                      int:
                        type: group
                        value:
                          type: group
                          offset_ratio:
                            type: float
                            value: 0.1
                            description: Relative shift for nested integer bounds.
              one_of:
                type: group
                value:
                  type: group
                  weight_delta:
                    type: float
                    value: 0.25
                    description: Max additive delta applied between one_of weights.
                    constraints:
                      ge: 0.0
                  force_weight:
                    type: bool
                    value: true
                    description: Force one weight to 1.0 for testing purposes.
                  child:
                    type: group
                    value:
                      type: group
                      maybe:
                        type: group
                        value:
                          type: group
                          null_delta:
                            type: float
                            value: 0.4
                            description: Max additive delta applied to nested maybe specs.
                      int:
                        type: group
                        value:
                          type: group
                          offset_ratio:
                            type: float
                            value: 0.1
                            description: Relative shift for nested integer bounds.
                      float:
                        type: group
                        value:
                          type: group
                          offset_ratio:
                            type: float
                            value: 0.1
                            description: Relative shift for nested float bounds.
              timestamp:
                type: group
                value:
                  type: group
                  offset_ratio:
                    type: float
                    value: 0.1
                    description: Relative fraction of the span used when shifting start/end.
                    constraints:
                      ge: 0.0
                  offset_abs:
                    type: list
                    value: [-3600, 3600]
                    description: Absolute offset bounds in seconds for timestamps.
                    items:
                      type: int
                  nullable:
                    type: group
                    value:
                      type: group
                      range:
                        type: list
                        value: [0.1, 0.3]
                        description: Inclusive range for p_null sampling when wrapping timestamps.
      fields:
        type: group
        value:
          type: group
          event_name:
            type: group
            mode: categorical
            choices:
            - purchase
            - login
            - search
            - view_item
            weights_delta:
              type: group
              purchase: 0.2
              login: -0.1
            q: 0.25
          event_value:
            type: group
            mode: numeric
            add: 0.0
            mul: 1.0
            jitter: 1.5
            q: 0.15
        description: Map individual fields to drift specs (categorical or numeric).
    burst:
      description: Network-phase; signals rate limiter to temporarily increase throughput simulating traffic bursts.
      type: group
      enabled:
        type: bool
        value: false
        description: Toggle burst traffic simulation.
      p:
        type: float
        value: 0.01
        description: Independent activation probability for burst initiation.
        constraints:
          ge: 0.0
          le: 1.0
      weight:
        type: float
        value: 5.2631578947368425
        description: Relative selection weight for the stochastic composer.
        constraints:
          gt: 0.0
      burst_rate:
        type: int
        value: 10000
        description: Target events per second during burst.
        constraints:
          ge: 1000
      burst_duration:
        type: int
        value: 10
        description: Burst duration in seconds.
        constraints:
          ge: 1
      require_cache_items:
        type: int
        value: null
        description: Minimum items in cache to allow burst (null = auto-calculate from rate * duration).
    schema_drift:
      description: Response-phase; applies add/drop/rename transforms to item dicts.
      type: group
      enabled:
        type: bool
        value: true
        description: 'Toggle schema drift: add/drop/rename fields in the response
          items.'
      p:
        type: float
        value: 0.01
        description: Independent activation probability for this op.
        constraints:
          ge: 0.0
          le: 1.0
      weight:
        type: float
        value: 5.2631578947368425
        description: Relative selection weight for the stochastic composer.
        constraints:
          gt: 0.0
      max_mutations:
        type: int
        value: 2
        description: Maximum structural mutations applied per activation.
        constraints:
          ge: 1.0
      config:
        type: group
        value:
          type: group
          max_mutations:
            type: int
            value: 2
            description: Override for mutation count; defaults to op-level value.
            constraints:
              ge: 1.0
          skip_fields:
            type: list
            value: []
            description: Field names that should never be dropped or renamed.
            items:
              type: string
          mutations:
            type: group
            value:
              type: group
              add_field:
                type: float
                value: 1.0
                description: Weight controlling how often new fields are added.
                constraints:
                  ge: 0.0
              drop_entry:
                type: float
                value: 1.0
                description: Weight controlling how often existing fields/options are removed.
                constraints:
                  ge: 0.0
              rename_entry:
                type: float
                value: 1.0
                description: Weight controlling how often fields/options are renamed.
                constraints:
                  ge: 0.0
              flatten_object:
                type: float
                value: 0.5
                description: Weight controlling how often nested objects are flattened into parents.
                constraints:
                  ge: 0.0
          templates:
            type: group
            value:
              type: group
              primitives:
                type: list
                value:
                - string
                - int
                - float
                - bool
                - timestamp
                description: Primitive spec templates considered when adding new fields.
              catalog:
                type: list
                value:
                - type: string
                  string_type: word
                - type: int
                  min: 0
                  max: 100
                - type: float
                  min: 0.0
                  max: 50.0
                  precision: 2
                description: Optional explicit spec templates for added fields (first-class overrides).
              maybe_probability:
                type: float
                value: 0.3
                description: Chance that a new field is wrapped in Maybe when added.
                constraints:
                  ge: 0.0
                  le: 1.0
        description: Detailed schema drift configuration (mutation weights and templates).
  scenarios:
    type: group
    active:
      description: active scenario names (e.g., black_friday)
      type: group
      list: []
