generation:
  type: group
  seed_mode:
    description: seed selection strategy
    type: enum
    choices:
    - auto,fixed
    value: fixed
  fixed_seed:
    description: fixed seed value (used only when seed_mode=fixed)
    type: int
    value: 123
generation_meta:
    enabled:
      status: true
      accepts: "bool"
      description: "include __meta in responses (per-item for schema GET; top-level for POST /v1/generate)"
    include_gen_ms:
        status: true
        accepts: "bool"
        description: "include generation time (gen_ms)"
    include_e2e_ms:
        status: true
        accepts: "bool"
        description: "include end-to-end handler time (e2e_ms)"

pregeneration:
  type: group
  enabled:
    type: bool
    value: true
    description: "Enable consuming pre-generated items from Redis."

  fallback_to_live:
    type: bool
    value: true
    description: "If cache is empty, generate items on-the-fly."

  require_cache:
    type: bool
    value: false
    description: "If true and cache is empty, error/stop instead of falling back."

  schemas:
    type: list
    value: [ga4, smoke]
    description: "Schemas to pre-generate (used by pregeneration worker)."
    items:
      type: string

  queue_size:
    type: int
    value: 100000
    description: "Target queue size per schema (worker may trim to this)."

  batch_size:
    type: int
    value: 100
    description: "Worker push batch size per schema."

  key_prefix:
    type: str
    value: "pregen"
    description: "Redis key prefix for pregeneration queues/meta."

  global_max_items:
    type: int
    value: null
    description: "Global maximum items across all schemas (null = unlimited)."

temporal:
  type: group
  # Modes:
  # - actual_time_based: Adjust timestamps based on real elapsed time
  # - per_generation: Increment by fixed step per item
  default_mode:
    type: str
    value: "actual_time_based"
    description: "Temporal mode: actual_time_based or per_generation."

  time_multiplier:
    type: float
    value: 1.0
    description: "Speed multiplier for actual_time_based (1.0 = real-time)."
