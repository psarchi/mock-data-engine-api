version: '3.8'

services:
  api:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    volumes:
      - .:/app
      - ./log:/app/log
    working_dir: /app
    command: bash -c "mkdir -p log && uvicorn server.app:app --host 0.0.0.0 --port 8000 --reload 2>&1 | tee log/terminal.log"
    environment:
      - PYTHONUNBUFFERED=1
