schema:
  name: GA4 Event (typespec, annotated)
  version: 0.1.1
  updated: 2025-09-25T06:20:14Z

kinds_catalog:
  - kind: object
    description: Map of named fields. `fields` defines child field specs.
  - kind: uuid
    description: Random UUID string (8-4-4-4-12 format). No options.
  - kind: string
    description: Arbitrary text. May include `format` or constraints (length, regex) if needed.
  - kind: string_or_null
    description: String or null. Use when value may be absent but field exists.
  - kind: int
    description: Integer number. Use `unit` for time-like ints (e.g., micros).
  - kind: float
    description: Floating-point number.
  - kind: bool
    description: Boolean true/false.
  - kind: enum
    description: One value from a fixed set in `values`.
  - kind: maybe
    description: Optional wrapper. Has probability/rules in generator layer; here it means 0..1 cardinality with `of` type.
  - kind: array
    description: Ordered list. `min_items`/`max_items`, and `of` defines element type.
  - kind: one_of
    description: Exactly one choice from `choices` (each with its own label + type).
  - kind: object_or_null
    description: Either an object (with `fields`) or null.
  - kind: select
    description: Key/value selection. Use in params-style collections with optional keys and per-key type rules.

root:
  type:
    kind: object  # kind: object — Map of named fields. `fields` defines child field specs.
    description: Canonical GA4-like event object.
  fields:
    user_pseudo_id:
      type:
        kind: uuid  # kind: uuid — Random UUID string (8-4-4-4-12 format). No options.
        description: Stable pseudonymous ID per user; never null.
        cardinality: "1"

    user_id:
      type:
        kind: string_or_null  # kind: string_or_null — String or null.
        description: Authenticated user identifier when available.
        cardinality: "0..1"

    event_date:
      type:
        kind: string  # kind: string — Arbitrary text. `format` may specify pattern semantics.
        format: "YYYYMMDD"
        description: Event date partition key.
        cardinality: "1"

    event_timestamp:
      type:
        kind: int  # kind: int — Integer number.
        unit: micros
        description: Event time in microseconds since Unix epoch.
        cardinality: "1"

    event_previous_timestamp:
      type:
        kind: maybe  # kind: maybe — Optional wrapper (0..1) containing `of` type.
        of:
          kind: int
          unit: micros
        description: Previous event timestamp when applicable.
        cardinality: "0..1"

    event_name:
      type:
        kind: enum  # kind: enum — One value from a fixed set in `values`.
        values:
          - session_start
          - page_view
          - purchase
          - login
          - sign_up
          - add_to_cart
        description: Discrete set of allowed event names.
        cardinality: "1"

    app_info:
      type:
        kind: object  # kind: object — Map of named fields.
        description: App metadata (id, version).
        cardinality: "0..1"
      fields:
        app_id:
          type:
            kind: string
            description: Reverse-DNS package id (e.g., com.example.app).
            cardinality: "1"
        app_version:
          type:
            kind: string
            description: Semantic version string (e.g., 1.2.3).
            cardinality: "1"

    stream_and_platform:
      type:
        kind: object
        description: Stream identifiers and platform.
        cardinality: "1"
      fields:
        stream_id:
          type:
            kind: int
            description: Numeric stream identifier.
            cardinality: "1"
        stream_name:
          type:
            kind: string
            description: Human-readable stream name.
            cardinality: "1"
        platform:
          type:
            kind: enum
            values: [web, android, ios]
            description: Client platform.
            cardinality: "1"

    collected_traffic_source:
      type:
        kind: object
        description: UTM-like collected source information.
        cardinality: "0..1"
      fields:
        referrer:  { type: { kind: string, cardinality: "0..1" } }
        source:    { type: { kind: string, cardinality: "0..1" } }
        medium:
          type:
            kind: enum
            values: [cpc, organic, email, referral, social]
            cardinality: "0..1"
        campaign:  { type: { kind: string, cardinality: "0..1" } }
        content:   { type: { kind: string, cardinality: "0..1" } }
        term:      { type: { kind: string, cardinality: "0..1" } }

    first_touch_traffic_source:
      type:
        kind: object
        description: First-touch source attribution.
        cardinality: "0..1"
      fields:
        source:   { type: { kind: string, cardinality: "0..1" } }
        medium:   { type: { kind: string, cardinality: "0..1" } }
        campaign: { type: { kind: string, cardinality: "0..1" } }
        ad_group: { type: { kind: string, cardinality: "0..1" } }

    device:
      type:
        kind: object
        description: Device information.
        cardinality: "1"
      fields:
        category:
          type:
            kind: enum
            values: [mobile, desktop, tablet]
            cardinality: "1"
        brand:      { type: { kind: string, cardinality: "0..1" } }
        model:      { type: { kind: string, cardinality: "0..1" } }
        is_limited_ad_tracking: { type: { kind: bool, cardinality: "1" } }

    ecommerce:
      type:
        kind: object_or_null  # kind: object_or_null — Either an object or null.
        description: Ecommerce context when event_name implies commerce.
        cardinality: "0..1"
      dependencies:
        - "event_name in [purchase, add_to_cart]"
      fields:
        transaction_id: { type: { kind: string, cardinality: "0..1" } }
        value:          { type: { kind: float, cardinality: "0..1" } }
        currency:       { type: { kind: string, cardinality: "0..1" } }

    event_params:
      type:
        kind: select  # kind: select — params-style selection with optional keys and per-key rules.
        description: Key/value parameter collection.
        cardinality: "0..N"
        optional: { session_id: 0.9, campaign: 0.6, medium: 0.7, source: 0.7, content: 0.3, term: 0.3 }
        value_rules:
          session_id: { type: { kind: int } }
          campaign:   { type: { kind: string } }
          medium:     { type: { kind: enum, values: [cpc, organic, email, referral, social] } }
          source:     { type: { kind: string } }
          content:    { type: { kind: string } }
          term:       { type: { kind: string } }
        as_objects: false
        key_field: key
        value_field: value

    items:
      type:
        kind: array  # kind: array — ordered list; `of` defines the element type.
        description: Line items for commerce-related events.
        cardinality: "0..N"
        min_items: 0
        max_items: 5
        of:
          kind: object
          fields:
            item_id:       { type: { kind: string, cardinality: "1" } }
            item_name:     { type: { kind: string, cardinality: "1" } }
            price:         { type: { kind: float, cardinality: "1" } }
            qty:           { type: { kind: int, cardinality: "1" } }
            item_params:
              type:
                kind: select
                description: Per-item parameters subset.
                cardinality: "0..N"
                optional: { color: 0.4, size: 0.3 }
                value_rules:
                  color: { type: { kind: enum, values: [red, green, blue] } }
                  size:  { type: { kind: enum, values: [S, M, L, XL] } }
                as_objects: true
                key_field: key
                value_field: value

    user_properties:
      type:
        kind: array
        description: GA4 user property objects.
        cardinality: "0..N"
        min_items: 0
        max_items: 5
        of:
          kind: object
          fields:
            key: { type: { kind: string, cardinality: "1" } }
            value:
              type:
                kind: one_of  # kind: one_of — Exactly one choice from `choices` is used.
                description: Exactly one typed value must be present.
                choices:
                  - label: string_value
                    type: { kind: string }
                  - label: int_value
                    type: { kind: int }
                  - label: double_value
                    type: { kind: float }
            set_ts:
              type:
                kind: maybe
                of: { kind: int, unit: micros }
                description: Optional set timestamp for this user property.
                cardinality: "0..1"

# example_instance: A full example of the GA4-like event object

